version: '3.8'

services:
  tts:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODEL: ${MODEL:-chatterbox}
    ports:
      - "8080:8080"
    environment:
      - MODEL=${MODEL:-chatterbox}
    volumes:
      - ../models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
